name: generic

# Keep the toolkit vendor-neutral + GitHub-native, and keep the dashboard emitter's
# contract green. Both gates are pure shell/stdlib — no install step needed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Genericness gate (vendor-neutral, GitHub-native)
        run: ./agent-dashboard/check-generic.sh
      - name: Install jq (emit-status assertions)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: agent-dashboard contract tests (pure shell/stdlib, shims cmux/tmux/git)
        run: |
          ./agent-dashboard/emit-status.test.sh
          ./agent-dashboard/dashboard.test.sh
          ./agent-dashboard/handler.test.sh
          ./agent-dashboard/transcript.test.sh
          ./agent-dashboard/dispatch.test.sh
